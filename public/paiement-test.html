<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Paiement - Anim-Formation</title>
</head>
<body>

<h1>Test Paiement FedaPay</h1>

<form id="test-form">
  <input type="email" id="email" placeholder="Votre email" required>
  <button type="submit">Tester Paiement</button>
</form>

<p id="output" style="margin-top:20px;"></p>

<script>
const form = document.getElementById("test-form");
const output = document.getElementById("output");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  output.textContent = "Création du paiement en cours...";

  try {
    const res = await fetch("/test-payment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();
    console.log("Données reçues :", data);

    if (data.v1_url) {
      output.innerHTML = `Lien de paiement reçu : <a href="${data.v1_url}" target="_blank">Ouvrir FedaPay</a>`;
    } else {
      output.textContent = "Erreur : v1_url non trouvé dans la réponse FedaPay.";
    }

  } catch (err) {
    console.error(err);
    output.textContent = "Erreur serveur.";
  }
});
</script>

</body>
</html>
